name: 生产环境发布

on:
  push:
    branches:
      - yykj
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 构建项目
        run: npm run build
      
      - name: 上传到 FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 47.109.188.146
          port: 21000
          username: hpylan
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
